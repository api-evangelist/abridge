name: Abridge
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: Abridge provides enterprise-grade generative AI for clinical conversations,
  transforming patient-clinician interactions into contextually aware, clinically useful, and
  billable AI-generated notes. Its Contextual Reasoning Engine powers ambient documentation
  embedded directly in the Epic EHR (Abridge Inside), with deployments across more than 100 health
  systems including Mayo Clinic, UPMC, Kaiser Permanente, Johns Hopkins, and Duke Health. Abridge
  reaches third-party developers and EHR partners through Epic's Partners and Pals program rather
  than a public, self-service developer API.
